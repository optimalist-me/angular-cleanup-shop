<header class="header" [class.header--open]="menuOpen()">
  <button
    class="header__overlay"
    type="button"
    aria-label="Close navigation"
    (click)="closeMenu()"
  ></button>
  <div class="header__inner">
    <a class="header__brand" routerLink="/">
      <img
        class="header__brand-logo"
        ngSrc="/images/cleanup-logo.png"
        width="94"
        height="92"
        alt="Angular Governance Program logo"
        priority
      />
      <span class="header__brand-copy">
        <shared-design-text
          class="header__brand-title"
          tone="accent"
          size="xl"
          weight="semibold"
        >
          Angular Governance Program
        </shared-design-text>
        <shared-design-text
          class="header__brand-subtitle"
          tone="muted"
          size="sm"
        >
          Governance-first stabilization for Angular and Nx.
        </shared-design-text>
      </span>
    </a>
    <button
      class="header__toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="header-nav"
    >
      Menu
    </button>
    <nav class="header__nav" id="header-nav">
      <a
        class="header__link"
        routerLink="/for-managers"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        For Managers
      </a>
      <a
        class="header__link"
        routerLink="/for-technical-leads"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        For Technical Leads
      </a>
      <a
        class="header__link"
        routerLink="/how-it-works"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Engagement Model
      </a>
      <a
        class="header__link"
        routerLink="/ai-governance"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        AI Governance
      </a>
    </nav>
    <div class="header__actions">
      <a
        class="header__cta"
        routerLink="/book"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Request executive introduction call
      </a>
    </div>
  </div>
</header>
