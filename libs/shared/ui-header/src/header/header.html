<header class="header" [class.header--open]="menuOpen()">
  <button
    class="header__overlay"
    type="button"
    aria-label="Close navigation"
    (click)="closeMenu()"
  ></button>
  <div class="header__inner">
    <a class="header__brand" routerLink="/">
      <img
        class="header__brand-logo"
        ngSrc="/images/cleanup-logo.png"
        width="94"
        height="92"
        alt="Angular Cleanup Shop logo"
        priority
      />
      <span class="header__brand-copy">
        <shared-design-text
          class="header__brand-title"
          tone="accent"
          size="xl"
          weight="semibold"
        >
          Angular Cleanup Shop
        </shared-design-text>
        <shared-design-text
          class="header__brand-subtitle"
          tone="muted"
          size="sm"
        >
          Less friction. More efficient development.
        </shared-design-text>
      </span>
    </a>
    <button
      class="header__toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="header-nav"
    >
      Menu
    </button>
    <nav class="header__nav" id="header-nav">
      <a
        class="header__link"
        routerLink="/products"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Products
      </a>
      <a
        class="header__link"
        routerLink="/playbook"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Playbook
      </a>
      <a
        class="header__link"
        routerLink="/architecture"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Architecture
      </a>
      <a
        class="header__link"
        routerLink="/faq"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        FAQ
      </a>
    </nav>
    <div class="header__actions">
      <a
        class="header__link header__link--icon"
        routerLink="/cart"
        routerLinkActive="header__link--active"
        aria-label="Cart"
        (click)="closeMenu()"
      >
        <ng-icon name="heroShoppingCart" size="18"></ng-icon>
        <shared-design-text size="sm" weight="medium">Cart</shared-design-text>
        @if (hasCartItems()) {
        <span class="header__cart-count" aria-label="Cart items">
          {{ cartCount() }}
        </span>
        }
      </a>
      <a
        class="header__cta"
        routerLink="/book"
        routerLinkActive="header__link--active"
        (click)="closeMenu()"
      >
        Request a 20-min fit check
      </a>
    </div>
  </div>
</header>
