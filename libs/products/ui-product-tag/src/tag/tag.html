<span
  class="tag"
  [class.tag--accent]="tone() === 'accent'"
  [class.tag--muted]="tone() === 'muted'"
  [class.tag--md]="size() === 'md'"
  [attr.aria-label]="ariaValue()"
>
  <shared-design-text
    [tone]="textTone()"
    size="xs"
    weight="semibold"
    [uppercase]="true"
  >
    {{ label() }}
  </shared-design-text>
</span>
