<article class="card" [class.card--linked]="ctaHref()">
  <div class="card__media">
    <img
      class="card__image"
      [ngSrc]="imageSrc()"
      [alt]="imageAlt()"
      width="1200"
      height="900"
      sizes="(max-width: 900px) 100vw, 33vw"
    />
  </div>
  <header class="card__header">
    @if (tag(); as label) {
    <products-tag
      class="card__tag"
      [label]="label"
      tone="accent"
    ></products-tag>
    }
    <h3 class="card__title">
      <shared-design-text size="lg" weight="semibold">
        {{ name() }}
      </shared-design-text>
    </h3>
  </header>

  @if (shortDescription()) {
  <p class="card__summary">
    <shared-design-text tone="muted" size="sm">
      {{ shortDescription() }}
    </shared-design-text>
  </p>
  } @if (hasDetails()) {
  <dl class="card__details">
    @if (outcome()) {
    <div class="card__detail">
      <dt>
        <shared-design-text
          tone="muted"
          size="xs"
          weight="medium"
          [uppercase]="true"
        >
          Outcome
        </shared-design-text>
      </dt>
      <dd>
        <shared-design-text size="sm">{{ outcome() }}</shared-design-text>
      </dd>
    </div>
    } @if (pattern()) {
    <div class="card__detail">
      <dt>
        <shared-design-text
          tone="muted"
          size="xs"
          weight="medium"
          [uppercase]="true"
        >
          Pattern
        </shared-design-text>
      </dt>
      <dd>
        <shared-design-text size="sm">{{ pattern() }}</shared-design-text>
      </dd>
    </div>
    }
  </dl>
  } @if (ctaHref(); as href) {
  <a class="card__cta" [href]="href">
    <shared-design-text tone="inverse" size="sm" weight="semibold">
      {{ ctaLabel() }}
    </shared-design-text>
  </a>
  }
</article>
