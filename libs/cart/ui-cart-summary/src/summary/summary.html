<section class="summary">
  <header class="summary__header">
    <h2 class="summary__title">Order summary</h2>
    <span class="summary__count">{{ formattedItems() }}</span>
  </header>

  <div class="summary__row">
    <span>Subtotal</span>
    <strong>{{ subtotal() | currency: 'EUR':'symbol':'1.0-0' }}</strong>
  </div>

  <button type="button" class="summary__cta" (click)="submitCheckout()">
    {{ ctaLabel() }}
  </button>
</section>
