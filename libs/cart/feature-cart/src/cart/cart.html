<section class="cart">
  <div class="cart__inner">
    <a class="cart__back" routerLink="/products">
      <shared-design-text tone="accent" size="sm" weight="semibold">
        Back to products
      </shared-design-text>
    </a>

    <header class="cart__intro">
      <h1 class="cart__title">
        <shared-design-text size="xl" weight="semibold"
          >Your cart</shared-design-text
        >
      </h1>
      <p class="cart__subtitle">
        <shared-design-text tone="muted" size="lg">
          Review the cleanups you are about to schedule.
        </shared-design-text>
      </p>
    </header>

    @if (hasItems()) {
    <div class="cart__layout">
      <div class="cart__items">
        @for (item of items(); track item.id) {
        <cart-line-item
          [id]="item.id"
          [name]="item.name"
          [imageSrc]="item.imageSrc"
          [imageAlt]="item.imageAlt"
          [price]="item.price"
          [quantity]="item.quantity"
          (quantityChange)="updateQuantity(item.id, $event)"
          (remove)="removeItem(item.id)"
        />
        }
      </div>

      <aside class="cart__summary">
        <cart-summary
          [itemCount]="itemCount()"
          [subtotal]="subtotal()"
          ctaLabel="Continue to checkout"
          (checkout)="checkout()"
        />
      </aside>
    </div>
    } @else {
    <shared-design-surface
      class="cart__empty"
      tone="default"
      padding="lg"
      radius="lg"
    >
      <p>
        <shared-design-text tone="muted" size="md"
          >Your cart is empty.</shared-design-text
        >
      </p>
      <a class="cart__empty-link" routerLink="/products">
        <shared-design-text tone="inverse" size="sm" weight="semibold">
          Browse products
        </shared-design-text>
      </a>
    </shared-design-surface>
    }
  </div>
</section>
