<section class="cart">
  <div class="cart__inner">
    <a class="cart__back" routerLink="/products">Back to products</a>

    <header class="cart__intro">
      <h1 class="cart__title">Your cart</h1>
      <p class="cart__subtitle">
        Review the cleanups you are about to schedule.
      </p>
    </header>

    @if (hasItems()) {
    <div class="cart__layout">
      <div class="cart__items">
        @for (item of items(); track item.id) {
        <cart-line-item
          [id]="item.id"
          [name]="item.name"
          [imageSrc]="item.imageSrc"
          [imageAlt]="item.imageAlt"
          [price]="item.price"
          [quantity]="item.quantity"
          (quantityChange)="updateQuantity(item.id, $event)"
          (remove)="removeItem(item.id)"
        />
        }
      </div>

      <aside class="cart__summary">
        <cart-summary
          [itemCount]="itemCount()"
          [subtotal]="subtotal()"
          ctaLabel="Continue to checkout"
          (checkout)="checkout()"
        />
      </aside>
    </div>
    } @else {
    <div class="cart__empty">
      <p>Your cart is empty.</p>
      <a class="cart__empty-link" routerLink="/products"> Browse products </a>
    </div>
    }
  </div>
</section>
