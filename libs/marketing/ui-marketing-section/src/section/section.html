<section
  class="section"
  [class.section--center]="align() === 'center'"
  [class.section--muted]="tone() === 'muted'"
  [class.section--compact]="size() === 'compact'"
>
  <div class="section__inner">
    @if (eyebrow()) {
    <p class="section__eyebrow">
      <shared-design-text
        tone="muted"
        size="sm"
        weight="medium"
        [uppercase]="true"
      >
        {{ eyebrow() }}
      </shared-design-text>
    </p>
    } @if (title()) {
    <h2 class="section__title">
      <shared-design-text size="2xl" weight="semibold">
        {{ title() }}
      </shared-design-text>
    </h2>
    } @if (subtitle()) {
    <p class="section__subtitle">
      <shared-design-text tone="muted" size="xl">
        {{ subtitle() }}
      </shared-design-text>
    </p>
    }
    <div class="section__content">
      <ng-content></ng-content>
    </div>
  </div>
</section>
