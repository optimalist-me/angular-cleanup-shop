upstream angular_cleanup_api {
  server 127.0.0.1:3333;
}

upstream angular_cleanup_shop_ssr {
  server 127.0.0.1:4000;
}

server {
  listen 80;
  listen [::]:80;
  server_name angularcleanup.shop www.angularcleanup.shop mail.angularcleanup.shop;

  # Needed for certbot http-01 validation.
  location /.well-known/acme-challenge/ {
    root /var/www/_letsencrypt;
  }

  location / {
    return 301 https://angularcleanup.shop$request_uri;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name demo.angularcleanup.shop;

  # Needed for certbot http-01 validation.
  location /.well-known/acme-challenge/ {
    root /var/www/_letsencrypt;
  }

  location / {
    return 301 https://demo.angularcleanup.shop$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name angularcleanup.shop www.angularcleanup.shop;

  # Update these paths after certificate provisioning.
  ssl_certificate /etc/letsencrypt/live/angularcleanup.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/angularcleanup.shop/privkey.pem;

  root /var/www/angular-cleanup-shop/shop/browser;
  index index.csr.html;

  client_max_body_size 10m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_vary on;

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|eot|map|txt|xml|webmanifest)$ {
    try_files $uri @shop_ssr;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  location = /api {
    proxy_pass http://angular_cleanup_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://angular_cleanup_api;
  }

  location / {
    try_files $uri $uri/ @shop_ssr;
  }

  location @shop_ssr {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://angular_cleanup_shop_ssr;
  }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name demo.angularcleanup.shop;

  # Replace with your certificate paths or certbot include snippets.
  ssl_certificate /etc/letsencrypt/live/demo.angularcleanup.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/demo.angularcleanup.shop/privkey.pem;

  root /var/www/angular-cleanup/storefront;
  index index.html;

  client_max_body_size 10m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
  gzip_vary on;

  location = /api {
    proxy_pass http://angular_cleanup_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://angular_cleanup_api;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|eot|map|txt|xml|webmanifest)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
}
